<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Blog Pro | Rishav Raj</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: #f8fafc; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="p-4 md:p-10">
    <nav class="max-w-6xl mx-auto mb-10 flex justify-between items-center">
        <h1 class="text-2xl font-extrabold text-indigo-500">AI-Blog<span class="text-white underline">Pro</span></h1>
        <div class="text-sm text-slate-400 font-medium">IEM Kolkata | 2026 Grad</div>
    </nav>

    <main class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
        <div class="lg:col-span-2 space-y-6">
            <input type="text" id="blog-title" placeholder="Enter Viral Title..." 
                class="w-full text-4xl font-extrabold bg-transparent outline-none border-b border-slate-700 pb-4 focus:border-indigo-500 transition-all">
            
            <textarea id="blog-content" placeholder="Start your technical story..." 
                class="w-full h-96 bg-slate-800/50 p-6 rounded-2xl border border-slate-700 outline-none focus:border-indigo-500 text-lg leading-relaxed"></textarea>
            
            <button onclick="publishPost()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 rounded-2xl shadow-lg transition-all active:scale-95">
                Publish to MongoDB
            </button>
        </div>

        <aside class="space-y-6">
            <div class="glass-card p-8 rounded-[32px] shadow-2xl">
                <h3 class="text-xl font-bold mb-4 flex items-center">✨ AI Assistant</h3>
                <div class="space-y-3">
                    <button onclick="askAI('suggest_title')" class="w-full text-left p-4 rounded-xl bg-slate-800 border border-slate-700 hover:border-indigo-500 transition-all text-sm font-semibold">💡 Suggest better title</button>
                    <button onclick="askAI('continue_writing')" class="w-full text-left p-4 rounded-xl bg-slate-800 border border-slate-700 hover:border-indigo-500 transition-all text-sm font-semibold">✍️ Continue writing</button>
                    <button onclick="askAI('summarize')" class="w-full text-left p-4 rounded-xl bg-slate-800 border border-slate-700 hover:border-indigo-500 transition-all text-sm font-semibold">📝 Generate Meta Tag</button>
                </div>
                <div id="ai-loading" class="hidden mt-6 text-center text-indigo-400 animate-pulse font-bold">AI is thinking...</div>
            </div>

            <div class="bg-indigo-900/40 p-6 rounded-2xl border border-indigo-500/30">
                <h4 class="font-bold mb-2">SEO Analytics</h4>
                <p class="text-sm text-slate-300">Readability: <span class="text-green-400 font-bold">Excellent</span></p>
                <p class="text-sm text-slate-300">Gen AI Optimization: <span class="text-indigo-400 font-bold">Enabled</span></p>
            </div>
        </aside>
    </main>

    <script>
        const API_KEY = "AIzaSyCGPGG-p27fA3FubsFkX8k1-XK3PwQblZM"; // Your provided Key

        async function askAI(type) {
            const title = document.getElementById('blog-title').value;
            const content = document.getElementById('blog-content').value;
            const loader = document.getElementById('ai-loading');

            let prompt = `As a technical blogger named Rishav Raj: `;
            if(type === 'suggest_title') prompt += `Suggest 3 SEO titles for: ${content}`;
            if(type === 'continue_writing') prompt += `Continue this technical blog post naturally: ${content}`;
            if(type === 'summarize') prompt += `Summarize this in 100 characters: ${title}`;

            loader.classList.remove('hidden');
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await response.json();
                if(!response.ok) throw new Error(data.error.message);

                const result = data.candidates[0].content.parts[0].text;
                if(type === 'continue_writing') document.getElementById('blog-content').value += "\n\n" + result;
                else alert("AI Assistant:\n" + result);
            } catch (err) {
                alert("Error: " + err.message);
            } finally {
                loader.classList.add('hidden');
            }
        }

        async function publishPost() {
            const title = document.getElementById('blog-title').value;
            const content = document.getElementById('blog-content').value;

            if(!title || !content) return alert("Fill all fields first!");

            try {
                const response = await fetch('http://localhost:5000/api/posts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, content })
                });
                const data = await response.json();
                if(response.ok) {
                    alert("✅ " + data.message);
                    document.getElementById('blog-title').value = "";
                    document.getElementById('blog-content').value = "";
                } else {
                    throw new Error(data.error);
                }
            } catch (err) {
                alert("Backend Error: Make sure your node server is running!");
            }
        }
    </script>
</body>
</html>
